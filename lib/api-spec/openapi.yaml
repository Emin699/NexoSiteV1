openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: NexoShop API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog
  - name: users
    description: User management
  - name: cart
    description: Shopping cart
  - name: orders
    description: Orders
  - name: wallet
    description: Wallet and transactions
  - name: coupons
    description: Coupon codes
  - name: wheel
    description: Wheel of destiny
  - name: loyalty
    description: Loyalty points
  - name: referral
    description: Referral program
  - name: jackpot
    description: Jackpot lottery
  - name: admin
    description: Admin panel operations
  - name: auth
    description: Authentication
  - name: reviews
    description: Product reviews
  - name: tickets
    description: Customer support tickets

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: authRegister
      tags: [auth]
      summary: Register with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRegisterBody"
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
        "409":
          description: Email already used

  /auth/verify-email:
    post:
      operationId: authVerifyEmail
      tags: [auth]
      summary: Verify email with code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailBody"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid code

  /auth/resend-code:
    post:
      operationId: authResendCode
      tags: [auth]
      summary: Resend verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendCodeBody"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOk"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /reviews:
    get:
      operationId: getAllReviews
      tags: [reviews]
      summary: Get all reviews with global stats
      responses:
        "200":
          description: All reviews with stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllReviewsResponse"
    post:
      operationId: submitReview
      tags: [reviews]
      summary: Submit a review after purchase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewBody"
      responses:
        "201":
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResponse"
        "400":
          description: Invalid input or already reviewed

  /reviews/me:
    get:
      operationId: getMyReviews
      tags: [reviews]
      summary: Get my reviews (for current user)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: My reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MyReviewItem"

  /reviews/product/{productId}:
    get:
      operationId: getProductReviews
      tags: [reviews]
      summary: Get reviews for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReviewItem"

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get all products
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /categories:
    get:
      operationId: getCategories
      tags: [products]
      summary: List public categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /admin/categories:
    get:
      operationId: adminListCategories
      tags: [admin]
      summary: List categories (admin)
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: adminCreateCategory
      tags: [admin]
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /admin/categories/{id}:
    patch:
      operationId: adminUpdateCategory
      tags: [admin]
      summary: Update category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: adminDeleteCategory
      tags: [admin]
      summary: Delete category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  /admin/products:
    get:
      operationId: adminGetProducts
      tags: [admin]
      summary: List all products (admin)
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: adminCreateProduct
      tags: [admin]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /admin/products/{id}:
    put:
      operationId: adminUpdateProduct
      tags: [admin]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    delete:
      operationId: adminDeleteProduct
      tags: [admin]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/products/{id}/variants:
    get:
      operationId: adminListVariants
      tags: [admin]
      summary: List variants of a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Variants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductVariant"
    post:
      operationId: adminCreateVariant
      tags: [admin]
      summary: Create a variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductVariantInput"
      responses:
        "201":
          description: Created variant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductVariant"

  /admin/products/{id}/variants/{variantId}:
    patch:
      operationId: adminUpdateVariant
      tags: [admin]
      summary: Update a variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: variantId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductVariantInput"
      responses:
        "200":
          description: Updated variant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductVariant"
        "404":
          description: Not found
    delete:
      operationId: adminDeleteVariant
      tags: [admin]
      summary: Delete a variant (and its stock)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: variantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/products/{id}/variants/{variantId}/stock:
    get:
      operationId: adminListStock
      tags: [admin]
      summary: List stock items of a variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: variantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stock items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockItem"
    post:
      operationId: adminAddStockBulk
      tags: [admin]
      summary: Add stock items in bulk (paste codes)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: variantId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkStockInput"
      responses:
        "200":
          description: Bulk add result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkStockResult"

  /admin/products/{id}/variants/{variantId}/stock/{stockId}:
    delete:
      operationId: adminDeleteStockItem
      tags: [admin]
      summary: Delete a stock item (only if status=available)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: variantId
          in: path
          required: true
          schema:
            type: integer
        - name: stockId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "409":
          description: Cannot delete sold stock item

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users/me/stats:
    get:
      operationId: getMeStats
      tags: [users]
      summary: Get user stats
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  /users/register:
    post:
      operationId: registerUser
      tags: [users]
      summary: Register or login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserBody"
      responses:
        "200":
          description: User registered or logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get cart items
      responses:
        "200":
          description: Cart items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartSummary"
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartBody"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartSummary"
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear cart
      responses:
        "200":
          description: Cart cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartSummary"

  /cart/{productId}:
    delete:
      operationId: removeFromCart
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartSummary"

  /cart/validate-coupon:
    post:
      operationId: validateCoupon
      tags: [cart]
      summary: Validate a coupon code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateCouponBody"
      responses:
        "200":
          description: Coupon validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponValidation"

  /cart/checkout:
    post:
      operationId: checkout
      tags: [cart]
      summary: Checkout (purchase cart)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutBody"
      responses:
        "200":
          description: Checkout result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResult"
        "400":
          description: Insufficient balance

  /orders:
    get:
      operationId: getOrders
      tags: [orders]
      summary: Get user orders
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/buy:
    post:
      operationId: buyProduct
      tags: [orders]
      summary: Buy a single product directly
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyProductBody"
      responses:
        "200":
          description: Purchase result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Insufficient balance

  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get wallet info
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/transactions:
    get:
      operationId: getTransactions
      tags: [wallet]
      summary: Get transaction history
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /wallet/recharge/crypto:
    post:
      operationId: initiateCryptoRecharge
      tags: [wallet]
      summary: Initiate a crypto recharge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CryptoRechargeBody"
      responses:
        "200":
          description: Recharge initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CryptoRechargeResult"

  /wallet/recharge/crypto/verify:
    post:
      operationId: verifyCryptoRecharge
      tags: [wallet]
      summary: Verify crypto payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCryptoBody"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyCryptoResult"

  /wallet/recharge/crypto/pending:
    get:
      operationId: getPendingCryptoRecharges
      tags: [wallet]
      summary: List user's pending crypto recharges
      responses:
        "200":
          description: Pending recharges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PendingCryptoRecharge"

  /wallet/recharge/crypto/pending/{id}:
    delete:
      operationId: cancelPendingCryptoRecharge
      tags: [wallet]
      summary: Cancel a pending crypto recharge
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOk"
        "404":
          description: Not found

  /wallet/recharge/paypal/config:
    get:
      operationId: getPaypalConfig
      tags: [wallet]
      summary: Get PayPal configuration (clientId + enabled flag)
      responses:
        "200":
          description: PayPal config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaypalConfig"

  /wallet/recharge/paypal/create:
    post:
      operationId: createPaypalOrder
      tags: [wallet]
      summary: Create a PayPal order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaypalCreateBody"
      responses:
        "200":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaypalCreateResult"
        "503":
          description: PayPal not configured

  /wallet/recharge/paypal/capture:
    post:
      operationId: capturePaypalOrder
      tags: [wallet]
      summary: Capture a PayPal order and credit the wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaypalCaptureBody"
      responses:
        "200":
          description: Captured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaypalCaptureResult"
        "503":
          description: PayPal not configured

  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: List all users (admin)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}/adjust:
    post:
      operationId: adminAdjustUser
      tags: [admin]
      summary: Adjust a user's balance/points/spins/tickets
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustUserBody"
      responses:
        "200":
          description: Adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdjustUserResult"

  /admin/orders/pending:
    get:
      operationId: adminGetPendingOrders
      tags: [admin]
      summary: List pending manual orders awaiting delivery
      responses:
        "200":
          description: Pending orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPendingOrdersResponse"

  /admin/orders/{id}/deliver:
    post:
      operationId: adminDeliverOrder
      tags: [admin]
      summary: Mark a manual order as delivered with credentials
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminDeliverOrderBody"
      responses:
        "200":
          description: Delivered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found

  /orders/{id}/customer-info:
    post:
      operationId: submitOrderCustomerInfo
      tags: [orders]
      summary: Submit customer info for an order that requires it
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitCustomerInfoBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Missing required fields
        "404":
          description: Order not found

  /orders/pending-count:
    get:
      operationId: getPendingOrdersCount
      tags: [orders]
      summary: Get global pending manual orders count for queue indicator
      responses:
        "200":
          description: Count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingOrdersCountResponse"

  /admin/jackpot/draw:
    post:
      operationId: adminDrawJackpot
      tags: [admin]
      summary: Draw a jackpot winner (weighted random)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JackpotDrawBody"
      responses:
        "200":
          description: Draw result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JackpotDrawResult"
        "400":
          description: No tickets in play

  /admin/jackpot/draws:
    get:
      operationId: adminGetJackpotDraws
      tags: [admin]
      summary: List recent jackpot draws
      responses:
        "200":
          description: Draws
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JackpotDraw"

  /admin/logs:
    get:
      operationId: adminGetLogs
      tags: [admin]
      summary: Get recent transactions and orders for admin logs panel
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLogsResponse"

  /tickets:
    get:
      operationId: getMyTickets
      tags: [tickets]
      summary: List the current user's tickets
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketSummary"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create a new support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketBody"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"
        "400":
          description: Invalid input

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get one of my tickets with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"
        "404":
          description: Not found

  /tickets/{id}/messages:
    post:
      operationId: postTicketMessage
      tags: [tickets]
      summary: Reply to one of my tickets
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketMessageBody"
      responses:
        "201":
          description: Message posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"
        "400":
          description: Invalid input
        "403":
          description: Ticket closed
        "404":
          description: Not found

  /admin/tickets:
    get:
      operationId: adminGetTickets
      tags: [admin]
      summary: List all tickets
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, closed, all]
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTicketSummary"

  /admin/tickets/{id}:
    get:
      operationId: adminGetTicket
      tags: [admin]
      summary: Get a ticket with messages (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTicketDetail"
        "404":
          description: Not found

  /admin/tickets/{id}/messages:
    post:
      operationId: adminPostTicketMessage
      tags: [admin]
      summary: Reply to a ticket (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketMessageBody"
      responses:
        "201":
          description: Message posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTicketDetail"
        "404":
          description: Not found

  /admin/tickets/{id}/status:
    patch:
      operationId: adminUpdateTicketStatus
      tags: [admin]
      summary: Update ticket status (open / closed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTicketStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTicketDetail"
        "404":
          description: Not found

  /wheel/spin:
    post:
      operationId: spinWheel
      tags: [wheel]
      summary: Spin the wheel of destiny
      responses:
        "200":
          description: Spin result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WheelSpinResult"
        "400":
          description: No spins available

  /wheel/status:
    get:
      operationId: getWheelStatus
      tags: [wheel]
      summary: Get wheel status
      responses:
        "200":
          description: Wheel status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WheelStatus"

  /loyalty/convert:
    post:
      operationId: convertPoints
      tags: [loyalty]
      summary: Convert loyalty points to balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvertPointsBody"
      responses:
        "200":
          description: Conversion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvertPointsResult"
        "400":
          description: Insufficient points

  /referral:
    get:
      operationId: getReferral
      tags: [referral]
      summary: Get referral info
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  /jackpot:
    get:
      operationId: getJackpot
      tags: [jackpot]
      summary: Get jackpot info
      responses:
        "200":
          description: Jackpot info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JackpotInfo"

  /tiers:
    get:
      operationId: getTiers
      tags: [users]
      summary: Get tier progression info
      responses:
        "200":
          description: Tier info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TierProgress"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        emoji:
          type: string
        category:
          type: string
        description:
          type: string
        price:
          type: number
        deliveryType:
          type: string
          enum: [auto, manual]
        inStock:
          type: boolean
        unlimitedStock:
          type: boolean
          description: "Si true, le produit est toujours achetable sans consommer de stock_items (livraison via digitalContent répété)."
        imageUrl:
          type: ["string", "null"]
        digitalContent:
          type: ["string", "null"]
        digitalImageUrl:
          type: ["string", "null"]
        requiresCustomerInfo:
          type: boolean
        customerInfoFields:
          type: array
          items:
            type: string
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
      required: [id, name, emoji, category, description, price, deliveryType, inStock, unlimitedStock, requiresCustomerInfo, customerInfoFields, variants]

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        icon:
          type: string
        sortOrder:
          type: integer
      required: [id, name, slug, icon, sortOrder]

    CategoryInput:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string
        sortOrder:
          type: integer
      required: [name]

    ProductVariant:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        name:
          type: string
        durationDays:
          type: ["integer", "null"]
        price:
          type: number
        sortOrder:
          type: integer
        isActive:
          type: boolean
        stockCount:
          type: integer
          description: "Nombre de stock_items disponibles (status=available). Pour livraison manuelle, valeur 0 mais variante toujours achetable."
      required: [id, productId, name, durationDays, price, sortOrder, isActive, stockCount]

    ProductVariantInput:
      type: object
      properties:
        name:
          type: string
        durationDays:
          type: ["integer", "null"]
        price:
          type: number
        sortOrder:
          type: integer
        isActive:
          type: boolean
      required: [name, price]

    StockItem:
      type: object
      properties:
        id:
          type: integer
        variantId:
          type: integer
        content:
          type: string
        status:
          type: string
          enum: [available, sold]
        soldOrderId:
          type: ["integer", "null"]
        soldAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, variantId, content, status, soldOrderId, soldAt, createdAt]

    BulkStockInput:
      type: object
      properties:
        codes:
          type: array
          items:
            type: string
          description: "Liste de codes/comptes (un par ligne côté UI). Chaque entrée devient un stock_item available."
      required: [codes]

    BulkStockResult:
      type: object
      properties:
        added:
          type: integer
        available:
          type: integer
      required: [added, available]

    AdminProductBody:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        description:
          type: string
        price:
          type: number
        deliveryType:
          type: string
          enum: [auto, manual]
        inStock:
          type: boolean
        unlimitedStock:
          type: boolean
        imageUrl:
          type: ["string", "null"]
        digitalContent:
          type: ["string", "null"]
        digitalImageUrl:
          type: ["string", "null"]
        requiresCustomerInfo:
          type: boolean
        customerInfoFields:
          type: array
          items:
            type: string
      required: [name, category, description, price, deliveryType, inStock]

    UploadResponse:
      type: object
      properties:
        url:
          type: string
      required: [url]

    SubmitCustomerInfoBody:
      type: object
      properties:
        info:
          type: object
          additionalProperties:
            type: string
      required: [info]

    AuthRegisterBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        firstName:
          type: string
        referralCode:
          type: string
          nullable: true
          description: "Code de parrainage optionnel (ID du parrain) capté depuis ?ref= dans l'URL"
      required: [email, password, firstName]

    AuthLoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
